name: Build and Publish Frontend to Backend

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # 🔧 Inject the API base URL (no trailing slash, no /api at the end)
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://corporate-cup-predictor-copy-1-production.up.railway.app
        run: npm run build

      - name: Publish to backend/wwwroot
        run: |
          rm -rf backend/wwwroot
          mkdir -p backend/wwwroot
          cp -R frontend/dist/* backend/wwwroot/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add backend/wwwroot
          git commit -m "Automated: build frontend and publish to backend/wwwroot" || echo "No changes"
          git push
